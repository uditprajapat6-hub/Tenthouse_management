<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
    
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 10px;
        }
    
        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    
        .approve {
            background: green;
            color: white;
        }
    
        .reject {
            background: red;
            color: white;
        }</style>
</head>

<body style="font-family: Arial; background:#f5f5f5;">
    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user || user.role !== "admin") {
            alert("Access denied");
            window.location = "login.html";
        }
    </script>
    <!-- ✅ NAVBAR HERE -->
    <div class="navbar">
        <div class="logo">TentHouse</div>
    
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="designs.html">Tent Designs</a>
            <a href="booking.html">Bookings</a>
            <a href="admin.html">Dashboard</a>
            <a href="#">Gallery</a>
        </div>
    
        <div class="book-btn">BOOK NOW</div>
        </div>
    <h1>Admin Dashboard 👑</h1>

    <!-- STATS -->
    <div style="display:flex; gap:20px; margin:20px 0;">

        <div style="padding:20px; background:#fff; border-radius:10px;">
            <h3>Total Bookings</h3>
            <h2 id="total">0</h2>
        </div>

        <div style="padding:20px; background:#fff; border-radius:10px;">
            <h3>Pending</h3>
            <h2 id="pending">0</h2>
        </div>

        <div style="padding:20px; background:#fff; border-radius:10px;">
            <h3>Confirmed</h3>
            <h2 id="confirmed">0</h2>
        </div>

    </div>

    <button onclick="getBookings()" style="padding:10px 20px;">
        Load Bookings
    </button>

    <div id="data"></div>

    <script src="script.js"></script>

</body>

</html>
